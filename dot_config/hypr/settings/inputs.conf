# Global input settings
input {
    kb_layout = us,jp
    repeat_rate = 25
    repeat_delay = 600
    follow_mouse = 1
    mouse_refocus = true
    float_switch_override_focus = 1
    touchpad {
        disable_while_typing = true
        natural_scroll = true
        scroll_factor = 1.0
        tap-to-click = true
    }
}

# Device specific settings
device {
    name = at-translated-set-2-keyboard
    kb_layout = jp
}

device {
    name = sino-wealth-gaming-kb
    kb_layout = us
}
