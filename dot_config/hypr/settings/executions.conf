exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY
exec-once = systemctl --user import-environment WAYLAND_DISPLAY
exec-once = sh -lc 'command -v uwsm >/dev/null 2>&1 && uwsm finalize || true'

# Auth / policy first
exec-once = systemctl --user start hyprpolkitagent

# Core session daemons
exec-once = qs -c noctalia-shell --no-duplicate
exec-once = hypridle

# Input method (often better before launching apps)
exec-once = fcitx5 -d

# Utilities
exec-once = udiskie
exec-once = kdeconnect-indicator

# User app (preference)
exec-once = ghostty
