general {
    border_size = 2
    gaps_in = 5
    gaps_out = 10
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 10
    rounding_power = 2

    blur {
        enabled = true
        size = 3
        passes = 2
        vibrancy = 0.1696
        popups = true
        input_methods = true
    }

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

animations {
    enabled = true
    workspace_wraparound = true

    # Unified easing set:
    # - soft/smooth for most things
    # - bouncy for move/drag/resize feel
    bezier = softOut,        0.22, 1,    0.36, 1
    bezier = softIn,         0.64, 0,    0.78, 0
    bezier = softInOut,      0.65, 0,    0.35, 1
    bezier = bouncyMove,     0.20, 0.90, 0.15, 1.15

    # windows
    animation = windows,      1, 4, softOut,   popin 92%
    animation = windowsIn,    1, 4, softOut,   popin 92%
    animation = windowsOut,   1, 4, softIn,    popin 88%
    animation = windowsMove,  1, 3, bouncyMove

    # layers (launchers/notifications etc.)
    animation = layers,     1, 4, softOut,  popin 95%
    animation = layersIn,   1, 4, softOut,  popin 95%
    animation = layersOut,  1, 4, softIn,   popin 92%

    # fade (keep it subtle but consistent)
    animation = fade,          1, 3, softInOut
    animation = fadeIn,        1, 3, softOut
    animation = fadeOut,       1, 3, softIn
    animation = fadeSwitch,    1, 2, softInOut
    animation = fadeShadow,    1, 3, softInOut
    animation = fadeDim,       1, 4, softInOut
    animation = fadeLayers,    1, 3, softInOut
    animation = fadeLayersIn,  1, 3, softOut
    animation = fadeLayersOut, 1, 3, softIn
    animation = fadePopups,    1, 3, softInOut
    animation = fadePopupsIn,  1, 3, softOut
    animation = fadePopupsOut, 1, 3, softIn
    animation = fadeDpms,      1, 6, softInOut

    # border
    animation = border,      1, 6, softInOut
    animation = borderangle, 1, 6, softInOut, loop

    # workspaces (soft slide + a hint of fade)
    animation = workspaces,         1, 3, softInOut, slidefade 20%
    animation = workspacesIn,       1, 3, softInOut, slidefade 20%
    animation = workspacesOut,      1, 3, softInOut, slidefade 20%
    animation = specialWorkspace,   1, 3, softInOut, slidefade 20%
    animation = specialWorkspaceIn, 1, 3, softInOut, slidefade 20%
    animation = specialWorkspaceOut,1, 3, softInOut, slidefade 20%

    # misc
    animation = zoomFactor,    1, 4, softInOut
    animation = monitorAdded,  1, 4, softOut
}

dwindle {
    pseudotile = true
    preserve_split = true
}

layerrule {
    name = noctalia
    match:namespace = noctalia-background-.*$
    ignore_alpha = 0.5
    blur = true
    blur_popups = true
}

monitor = , preferred, auto, 1.0
